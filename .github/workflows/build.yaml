name: README build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACCESS_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r cache/requirements.txt
          pip install -r scripts/requirements.txt

      - name: Update stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py

      - name: Scrape contributions
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Render info card
        run: python scripts/make_info_card.py

      - name: Render skills card
        run: python scripts/generate_tech_stack.py

      - name: Update quote
        run: python scripts/update_quote.py

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh profile art [skip ci]"
          file_pattern: "README.md data/ dycandx-ascii.svg info-card.svg contrib-heatmap.svg tech-stack.svg profile-3d-contrib/"
          commit_user_name: DycandX
          commit_user_email: karismaviki@gmail.com
          commit_author: DycandX <karismaviki@gmail.com>
